<!-- Flex box enables one dimensional layout allowing to arrange items in a row 
or a column  Used to responsive websites Already learnt display : block inline and inline block
Now display : flex-->

<!-- Flex box direction - it sets how flex items are placed in the flex container 
defining the main axis and the cross axis. -->
<!-- Justify content - it defines the alignment along with the main axis.
It helps distribute extra free space leftover between and around the items -->
<!-- flex-basis - it defines the default size of an element before the remaining space is distributed. -->

<!-- flex-grow - it defines the ability for a flex item to grow if necessary.
 It accepts a unitless value that serves as a proportion. 
 It dictates what amount of the available space inside the flex container the item should take up. -->

 <!-- flex-shrink - it defines the ability for a flex item to shrink if necessary. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border = "black">
        <caption> Items Table</caption>
        <thead border="black">
            <tr>
                <td rowspan="2">Item</td>
                <td colspan="2">Price</td>
            </tr>

            <tr>
                <td>INR</td>
                <td>USD</td>
            </tr>

        </thead>
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
                <td>0.14</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>12</td>
                <td>0.17</td>
            </tr>
            <tr>
                <td>Chips</td>
                <td>30</td>
                <td>0.28</td>
            </tr>
        </tbody>
    </table>
   <br>
   <br>
   <br>


   <table border = "black">
    <caption> Tables with merged cells </caption>
    <thead>
        <tr>
            <td rowspan="2"> </td>
            <td colspan = "2">Average</td>
            <td rowspan = "2">Red Eyes</td>
        </tr>
        <tr>
            <td>Height</td>
            <td>Weight</td>
        </tr>


    </thead>
    <tbody>
        <tr>
            <td>Males</td>
            <td>1.9</td>
            <td>0.003</td>
            <td>40%</td>
        </tr>

        <tr>
            <td>Females</td>
            <td>1.7</td>
            <td>0.002</td>
            <td>43%</td>
        </tr>

    </tbody>
   </table>
</body>
</html>
